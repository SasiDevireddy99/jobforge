spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jobforge}
    username: ${SPRING_DATASOURCE_USERNAME:jobforge}
    password: ${SPRING_DATASOURCE_PASSWORD:jobforge}
  flyway.enabled: true
server.shutdown: graceful
jobforge:
  jwt-secret: ${JWT_SECRET:local-development-secret-local-development-secret}
  worker:
    capacity: 8
    lease-seconds: 30
