services:
  db:
    image: postgres:16-alpine
    environment: {POSTGRES_DB: jobforge, POSTGRES_USER: jobforge, POSTGRES_PASSWORD: jobforge}
    ports: ["5432:5432"]
    volumes: [pg:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobforge"]
      interval: 5s
      timeout: 3s
      retries: 20
  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/jobforge
      SPRING_DATASOURCE_USERNAME: jobforge
      SPRING_DATASOURCE_PASSWORD: jobforge
      JWT_SECRET: local-development-secret-local-development-secret
    ports: ["8080:8080"]
    depends_on:
      db: {condition: service_healthy}
  frontend:
    build: ./frontend
    ports: ["5173:80"]
    depends_on: [backend]
volumes: {pg: {}}
